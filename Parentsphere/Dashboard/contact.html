<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - ParentSphere</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('/images/background.webp') no-repeat center center fixed;
            background-size: cover;
            color: #333;
            line-height: 1.6;
        }
        
        header {
            background-color: rgba(0, 77, 153, 0.9);
            color: white;
            padding: 15px 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(5px);
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.1);
        }
        
        .container {
            padding: 40px 20px;
            text-align: center;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h2 {
            color: #fff;
            margin-bottom: 30px;
            font-size: 2.2rem;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.3);
        }
        
        p {
            font-size: 1.1em;
            margin: 10px 0;
        }
        
        .contact-info {
            margin: 30px auto;
            background-color: rgba(255, 255, 255, 0.95);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
            border-radius: 15px;
            padding: 30px;
            max-width: 600px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .contact-info:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.2);
        }
        
        .contact-info h3 {
            color: #004d99;
            margin-bottom: 20px;
            font-size: 1.5rem;
            border-bottom: 2px solid #004d99;
            padding-bottom: 10px;
            display: inline-block;
        }
        
        .contact-info p {
            font-size: 1.05em;
            color: #444;
            margin: 15px 0;
        }
        
        .contact-info a {
            color: #0066cc;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
        }
        
        .contact-info a:hover {
            color: #004d99;
            text-decoration: underline;
        }
        
        /* Header styles */
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .logo {
            display: flex;
            align-items: center;
            font-size: 1.5em;
            font-weight: bold;
            color: white;
            text-decoration: none;
        }
        
        .logo img {
            height: 35px;
            margin-right: 12px;
            filter: drop-shadow(1px 1px 2px rgba(0,0,0,0.2));
        }
        
        nav ul {
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
        }
        
        nav li {
            margin-left: 25px;
            position: relative;
        }
        
        nav a {
            text-decoration: none;
            color: white;
            font-weight: 500;
            padding: 5px 0;
            transition: color 0.2s ease;
        }
        
        nav a:hover {
            color: #aad4ff;
        }
        
        nav a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: 0;
            left: 0;
            background-color: #aad4ff;
            transition: width 0.3s ease;
        }
        
        nav a:hover::after {
            width: 100%;
        }
        
        /* Responsive adjustments */
        @media (max-width: 768px) {
            .header-container {
                flex-direction: column;
                padding: 10px 0;
            }
            
            .logo {
                margin-bottom: 10px;
            }
            
            nav ul {
                flex-wrap: wrap;
                justify-content: center;
            }
            
            nav li {
                margin: 5px 15px;
            }
            
            .contact-info {
                padding: 20px;
                margin: 20px 15px;
            }
            
            h2 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-container">
            <a href="index.html" class="logo">
                <img src="/images/ParentSphere.jpg" alt="ParentSphere Logo">
                ParentSphere
            </a>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About Us</a></li>
                    <li><a href="login.html">Login</a></li>
                    <li><a href="signup.html">Sign Up</a></li>
                    <li><a href="contact.html">Contact Us</a></li>
                </ul>
            </nav>
        </div>
    </header>
    
    <div class="container">
        <h2>We'd love to hear from you!</h2>
        <div class="contact-info">
            <h3>Keystone School Of Engineering</h3>
            <p>Near Handewadi Chowk,</p>
            <p>Urali Devachi, Shewalewadi,</p>
            <p>Pune – 412308</p>
            <p>Email: <a href="mailto:admission@keystonesoe.in">admission@keystonesoe.in</a></p>
            <p>Phone: <a href="tel:+91XXXXXXXXXX">+91 XXXXX XXXXX</a></p>
        </div>
    </div>
</body>
</html>
